<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversa · Cardápio Web</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; background: #f0eaf8; color: #101828; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout raiz ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px;
      gap: 10px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: #fff;
      border: 1px solid #ece3f6;
      border-radius: 14px;
      flex-shrink: 0;
      gap: 10px;
    }
    .header-left .title { font-size: 15px; font-weight: 800; }
    .header-left .subtitle { font-size: 12px; color: #6A3696; margin-top: 2px; }
    .header-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .chip {
      padding: 5px 10px; border-radius: 8px;
      background: #f3ecfa; border: 1px solid #ece3f6;
      font-size: 12px; color: #6A3696; font-weight: 600; white-space: nowrap;
    }
    .btn-copy {
      padding: 5px 10px; border-radius: 8px;
      background: #fff; border: 1px solid #ece3f6;
      font-size: 12px; color: #6A3696; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: background .1s;
    }
    .btn-copy:hover { background: #f3ecfa; }

    /* ── Corpo principal ── */
    .body {
      display: flex;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    /* ── Painel de chat ── */
    .chat-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid #ece3f6;
      border-radius: 14px;
      overflow: hidden;
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      scroll-behavior: smooth;
    }

    /* ── Sidebar de info ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #ece3f6;
      border-radius: 14px;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-section-title {
      font-size: 10px;
      font-weight: 800;
      color: #6A3696;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding-bottom: 4px;
      border-bottom: 1px solid #f3ecfa;
    }
    .info-row { display: flex; flex-direction: column; gap: 2px; }
    .info-label { font-size: 10px; color: #667085; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .info-value { font-size: 13px; color: #101828; font-weight: 500; word-break: break-word; }
    .info-value.empty { color: #d0d5dd; font-style: italic; }

    .badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
    }
    .badge-purple { background: #f3ecfa; color: #6A3696; }
    .badge-green  { background: #ecfdf3; color: #027a48; }
    .badge-red    { background: #fef3f2; color: #b42318; }
    .badge-yellow { background: #fffaeb; color: #b54708; }
    .badge-gray   { background: #f2f4f7; color: #344054; }

    /* ── Estado vazio / loading / erro ── */
    .state-box {
      padding: 48px 20px; text-align: center;
      color: #667085; font-size: 14px; line-height: 1.6;
    }
    .state-box .icon { font-size: 32px; margin-bottom: 12px; }
    .state-box strong { color: #101828; }

    /* ── Responsivo ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="title">Conversa</div>
        <div class="subtitle" id="subtitle">Histórico formatado · Cardápio Web</div>
      </div>
      <div class="header-right">
        <button class="btn-copy" id="btn-copy" style="display:none" onclick="copiarLink()">🔗 Copiar link</button>
        <div class="chip">Chat Viewer</div>
      </div>
    </div>

    <!-- Corpo -->
    <div class="body">

      <!-- Chat -->
      <div class="chat-panel">
        <div id="chat-box">
          <div class="state-box">
            <div class="icon">⏳</div>
            Carregando conversa…
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar" id="sidebar" style="display:none">

        <div class="sidebar-section" id="section-basic">
          <div class="sidebar-section-title">Identificação</div>
          <!-- preenchido via JS -->
        </div>

        <div class="sidebar-section" id="section-status">
          <div class="sidebar-section-title">Status</div>
        </div>

        <div class="sidebar-section" id="section-bant">
          <div class="sidebar-section-title">BANT</div>
        </div>

        <div class="sidebar-section" id="section-utm">
          <div class="sidebar-section-title">Origem</div>
        </div>

        <div class="sidebar-section" id="section-dates">
          <div class="sidebar-section-title">Datas</div>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL  = 'https://rydlkqomjokkhxghgqde.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5ZGxrcW9tam9ra2h4Z2hncWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkzNDk3MjksImV4cCI6MjA4NDkyNTcyOX0.dSFlYGHcsJw2HIlrqXlF7eK7ij0JJ72VbeTcWqFxFws';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── helpers ──────────────────────────────────────────────────────────────

    function esc(str = '') {
      return String(str ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;').replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function val(v) {
      return (v == null || v === '') ? null : v;
    }

    function fmtDate(iso) {
      if (!iso) return null;
      return new Date(iso).toLocaleString('pt-BR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    // Decide o lado da mensagem
    // "Lead" vai para a ESQUERDA; qualquer ator de equipe vai para a DIREITA
    function actorSide(actorRaw = '') {
      const a = actorRaw.trim().toLowerCase();
      const isLead = a === 'lead' || a.includes('cliente') || a.includes('usuário') || a.includes('usuario');
      return isLead ? 'left' : 'right';
    }

    function actorStyle(side) {
      if (side === 'right') {
        return {
          bubbleBg: 'linear-gradient(135deg, #6A3696, #8246B8)',
          bubbleColor: '#ffffff',
          border: 'rgba(255,255,255,.18)',
          chipBg: 'rgba(255,255,255,.15)',
          chipColor: '#fff',
          nameColor: '#fff',
        };
      }
      return {
        bubbleBg: '#f8f4fc',
        bubbleColor: '#101828',
        border: '#eef2f6',
        chipBg: '#f3ecfa',
        chipColor: '#6A3696',
        nameColor: '#6A3696',
      };
    }

    const REGEX = /^(.*?\])\s*([^:]+):\s*(.*)$/;

    function renderConversa(conversa) {
      const linhas = conversa.split('\n').map(l => l.trim()).filter(Boolean);

      return linhas.map(linha => {
        const match = linha.match(REGEX);

        if (!match) {
          return `<div style="display:flex;justify-content:flex-start;margin:8px 0;">
            <div style="max-width:78%;background:#f8f4fc;border:1px solid #eef2f6;
              border-radius:14px;padding:10px 12px;font-size:13px;line-height:1.55;
              color:#101828;">${esc(linha)}</div></div>`;
        }

        const [, tsRaw, actorRaw, msgRaw] = match;
        const side = actorSide(actorRaw);
        const st   = actorStyle(side);
        const isRight = side === 'right';
        const msg = esc(msgRaw).replaceAll('\n', '<br/>');

        return `
          <div style="display:flex;flex-direction:column;align-items:${isRight ? 'flex-end' : 'flex-start'};margin:10px 0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;${isRight ? 'flex-direction:row-reverse;' : ''}">
              <span style="padding:3px 8px;border-radius:999px;background:${st.chipBg};
                color:${st.chipColor};font-size:11px;font-weight:600;white-space:nowrap;">
                ${esc(tsRaw)}
              </span>
              <span style="font-size:11px;font-weight:700;color:${st.nameColor};white-space:nowrap;">
                ${esc(actorRaw.trim())}
              </span>
            </div>
            <div style="max-width:78%;background:${st.bubbleBg};color:${st.bubbleColor};
              border:1px solid ${st.border};
              border-radius:18px;${isRight ? 'border-top-right-radius:4px;' : 'border-top-left-radius:4px;'}
              padding:10px 14px;box-shadow:0 4px 14px rgba(16,24,40,.07);
              font-size:13px;line-height:1.6;word-break:break-word;">
              ${msg}
            </div>
          </div>`;
      }).join('');
    }

    // ── Sidebar helpers ───────────────────────────────────────────────────────

    function infoRow(label, value, badge) {
      const display = val(value);
      if (badge && display) {
        return `<div class="info-row">
          <span class="info-label">${label}</span>
          <span class="badge ${badge}">${esc(display)}</span>
        </div>`;
      }
      return `<div class="info-row">
        <span class="info-label">${label}</span>
        <span class="info-value${display ? '' : ' empty'}">${display ? esc(display) : '—'}</span>
      </div>`;
    }

    function tempBadge(t) {
      if (!t) return 'badge-gray';
      const v = String(t).toLowerCase();
      if (v.includes('quente') || v === 'hot') return 'badge-red';
      if (v.includes('morno') || v === 'warm') return 'badge-yellow';
      return 'badge-gray';
    }

    function statusBadge(s) {
      if (!s) return 'badge-gray';
      const v = String(s).toLowerCase();
      if (v.includes('won') || v.includes('ganho')) return 'badge-green';
      if (v.includes('lost') || v.includes('perdido')) return 'badge-red';
      return 'badge-purple';
    }

    function fillSidebar(d) {
      document.getElementById('sidebar').style.display = 'flex';

      document.getElementById('section-basic').innerHTML = `
        <div class="sidebar-section-title">Identificação</div>
        ${infoRow('Nome', d.name)}
        ${infoRow('WhatsApp', d.whatsapp)}
        ${infoRow('Email', d.email)}
        ${infoRow('Empresa', d.empresa)}
        ${infoRow('Segmento', d.segmento)}
      `;

      document.getElementById('section-status').innerHTML = `
        <div class="sidebar-section-title">Status</div>
        ${infoRow('Status', d.status, statusBadge(d.status))}
        ${infoRow('Etapa', d.etapa_conversa, 'badge-purple')}
        ${infoRow('Temperatura', d.temperatura, tempBadge(d.temperatura))}
        ${infoRow('Closer', d.closer)}
        ${infoRow('Follow-ups', d.followup_count != null ? String(d.followup_count) : null)}
        ${infoRow('Plano sugerido', d.plano_sugerido)}
        ${infoRow('Objeções', d.objecoes)}
      `;

      document.getElementById('section-bant').innerHTML = `
        <div class="sidebar-section-title">BANT</div>
        ${infoRow('Need (necessidade)', d.need)}
        ${infoRow('Budget (faturamento)', d.faturamento)}
        ${infoRow('Authority', d.authority)}
        ${infoRow('Timing', d.timing)}
      `;

      document.getElementById('section-utm').innerHTML = `
        <div class="sidebar-section-title">Origem</div>
        ${infoRow('UTM Source', d.utm_source)}
        ${infoRow('UTM Content', d.utm_content)}
      `;

      document.getElementById('section-dates').innerHTML = `
        <div class="sidebar-section-title">Datas</div>
        ${infoRow('Criado em', fmtDate(d.date_created))}
        ${infoRow('Atualizado em', fmtDate(d.date_updated))}
        ${infoRow('Agendamento', fmtDate(d.data_agendamento))}
        ${infoRow('Motivo perda', d.motivo_perda)}
      `;
    }

    function showError(icon, title, detail = '') {
      document.getElementById('chat-box').innerHTML = `
        <div class="state-box">
          <div class="icon">${icon}</div>
          <strong>${title}</strong>
          ${detail ? `<br/><span style="font-size:13px;color:#667085;margin-top:6px;display:block;">${esc(detail)}</span>` : ''}
        </div>`;
    }

    function copiarLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('btn-copy');
        btn.textContent = '✅ Copiado!';
        setTimeout(() => { btn.textContent = '🔗 Copiar link'; }, 2000);
      });
    }
    window.copiarLink = copiarLink;

    // ── Main ─────────────────────────────────────────────────────────────────

    const leadId = new URLSearchParams(window.location.search).get('lead_id');

    if (!leadId) {
      showError('🔗', 'lead_id não informado', 'Acesse esta página com ?lead_id=UUID na URL.');
    } else {
      const { data, error } = await supabase
        .from('leads_conversa')
        .select('*')
        .eq('lead_id', leadId)
        .maybeSingle();

      if (error) {
        showError('⚠️', 'Erro ao carregar', error.message);
      } else if (!data) {
        showError('🔍', 'Conversa não encontrada', `Nenhum lead com id ${leadId}.`);
      } else {
        // Header
        const nome = val(data.name) ?? 'Lead';
        const wp   = val(data.whatsapp) ?? '';
        document.title = `${nome} · Conversa · Cardápio Web`;
        document.getElementById('subtitle').innerHTML =
          [nome, wp, 'Cardápio Web'].filter(Boolean).map(esc).join(' &nbsp;·&nbsp; ');

        document.getElementById('btn-copy').style.display = 'inline-block';

        // Chat
        const chatHtml = data.conversa ? renderConversa(data.conversa) : '';
        document.getElementById('chat-box').innerHTML = chatHtml ||
          `<div class="state-box"><div class="icon">💬</div><strong>Sem mensagens registradas</strong></div>`;

        // Scroll para o fim
        const box = document.getElementById('chat-box');
        box.scrollTop = box.scrollHeight;

        // Sidebar
        fillSidebar(data);
      }
    }
  </script>
</body>
</html>
